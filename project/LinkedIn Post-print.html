<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>LinkedIn Post — Rhapsode</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --li-bg: #f4f2ee;
    --li-card: #ffffff;
    --li-ink: #000000e6;
    --li-ink-2: #00000099;
    --li-ink-3: #00000073;
    --li-line: #00000014;
    --li-hover: #00000008;
    --li-blue: #0a66c2;
    --li-blue-dark: #004182;
  }
  html, body {
    background: var(--li-bg);
    color: var(--li-ink);
    font-family: 'Source Sans 3', -apple-system, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  @media print {
    @page { size: letter portrait; margin: 0; }
    html, body {
      background: #ffffff !important;
      padding: 20px 24px;
      min-height: auto;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .topnav, .viewport-label, .helper, .tweaks { display: none !important; }
    .page { margin: 0 auto; max-width: 100%; }
    .card {
      break-inside: avoid;
      box-shadow: none;
      border: 1px solid #00000022;
    }
    .hero-wrap { break-inside: avoid; }
    .action:hover { background: transparent; }
  }

  /* LinkedIn top nav */
  .topnav {
    background: var(--li-card);
    border-bottom: 1px solid var(--li-line);
    padding: 6px 24px;
    display: flex; align-items: center; gap: 10px;
    height: 52px;
  }
  .topnav .logo {
    width: 34px; height: 34px; border-radius: 4px;
    background: var(--li-blue); color: #fff;
    display: grid; place-items: center;
    font-weight: 700; font-size: 18px; font-style: italic;
  }
  .topnav .search {
    width: 280px; padding: 8px 12px;
    background: #edf3f8; border-radius: 4px;
    color: var(--li-ink-3); font-size: 14px;
  }

  .page {
    max-width: 555px;
    margin: 24px auto 0;
  }
  .viewport-label {
    text-align: center;
    font-size: 11px;
    color: var(--li-ink-3);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: 12px;
    font-weight: 500;
  }

  .card {
    background: var(--li-card);
    border: 1px solid var(--li-line);
    border-radius: 10px;
    overflow: hidden;
  }

  .post-head {
    padding: 12px 16px 8px;
    display: grid;
    grid-template-columns: 48px 1fr auto;
    gap: 10px;
    align-items: start;
  }
  .avatar {
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, #6b3fa0 0%, #b8a1ff 60%, #f6d365 100%);
    display: grid; place-items: center;
    color: #fff; font-weight: 700; font-size: 17px;
  }
  .author-line {
    font-size: 14px; font-weight: 600; color: var(--li-ink);
    line-height: 1.3;
  }
  .author-line .you {
    color: var(--li-ink-3); font-weight: 400;
    margin-left: 2px;
  }
  .author-sub, .author-time {
    font-size: 12px; color: var(--li-ink-2);
    line-height: 1.4;
  }
  .author-time {
    display: flex; align-items: center; gap: 4px;
    color: var(--li-ink-3);
  }
  .author-time .dot { opacity: 0.5; }

  .more {
    display: flex; align-items: flex-start; gap: 14px;
    color: var(--li-ink-2);
  }
  .more .x { font-size: 18px; line-height: 1; }
  .follow { color: var(--li-blue); font-weight: 600; font-size: 14px; }
  .follow::before { content: '+ '; }

  .caption {
    padding: 4px 16px 12px;
    font-size: 14px;
    line-height: 1.5;
    color: var(--li-ink);
    white-space: pre-wrap;
  }
  .caption .hashtag { color: var(--li-blue); font-weight: 600; }
  .caption .see-more {
    color: var(--li-ink-3);
    cursor: pointer;
  }

  .hero-wrap {
    background: #0b0910;
    border-top: 1px solid var(--li-line);
    border-bottom: 1px solid var(--li-line);
  }
  .hero-wrap img {
    width: 100%; height: auto; display: block;
  }

  /* Reactions */
  .reactions {
    padding: 8px 16px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12.5px; color: var(--li-ink-2);
    border-bottom: 1px solid var(--li-line);
  }
  .react-left { display: flex; align-items: center; gap: 6px; }
  .react-icons { display: inline-flex; }
  .react-icon {
    width: 16px; height: 16px; border-radius: 50%;
    display: inline-grid; place-items: center;
    font-size: 10px; color: #fff;
    margin-left: -3px;
    border: 1.5px solid var(--li-card);
  }
  .react-icon:first-child { margin-left: 0; }
  .react-icon.like { background: #0a66c2; }
  .react-icon.clap { background: #6dae4f; }
  .react-icon.heart { background: #df704d; }

  .actions {
    padding: 4px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
  }
  .action {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 4px;
    color: var(--li-ink-2);
    font-weight: 600; font-size: 13.5px;
    border-radius: 4px;
    cursor: pointer;
  }
  .action:hover { background: var(--li-hover); }
  .action .ico { font-size: 18px; line-height: 1; }

  /* Helper */
  .helper {
    margin-top: 20px;
    background: #fff;
    border: 1px solid var(--li-line);
    border-radius: 10px;
    padding: 16px 18px;
    font-size: 13px;
    color: var(--li-ink-2);
  }
  .helper h3 {
    font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--li-ink-3);
    margin-bottom: 8px;
  }
  .helper .count {
    float: right; font-weight: 500; color: var(--li-ink-3);
  }
  .helper pre {
    font-family: 'Source Sans 3', sans-serif;
    white-space: pre-wrap;
    color: var(--li-ink);
    font-size: 13px; line-height: 1.5;
    background: #f6f5f2;
    padding: 12px 14px;
    border-radius: 6px;
    border: 1px solid var(--li-line);
    max-height: 360px;
    overflow: auto;
  }
  .helper .copy-btn {
    margin-top: 10px;
    padding: 6px 14px;
    background: var(--li-blue);
    color: #fff; font-weight: 600; font-size: 13px;
    border: none; border-radius: 16px;
    cursor: pointer;
  }
  .helper .copy-btn:hover { background: var(--li-blue-dark); }
  .helper .hint {
    margin-top: 8px; font-size: 11.5px; color: var(--li-ink-3);
    font-style: italic;
  }

  /* Tweaks */
  .tweaks {
    position: fixed;
    bottom: 20px; right: 20px;
    width: 290px;
    background: #1c1b1a;
    color: #e8e4ec;
    border-radius: 10px;
    padding: 14px 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 12px;
    display: none;
    z-index: 100;
  }
  .tweaks.on { display: block; }
  .tweaks h4 {
    font-size: 10px; font-weight: 700; letter-spacing: 0.16em;
    text-transform: uppercase; color: #8a8193;
    margin-bottom: 10px;
  }
  .tweaks label {
    display: block; margin-bottom: 12px;
  }
  .tweaks label > span {
    display: block; font-size: 10px; color: #8a8193;
    margin-bottom: 5px;
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .tweaks select, .tweaks input[type="text"] {
    width: 100%;
    background: #0b0910;
    color: #e8e4ec;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    padding: 7px 9px;
    font-family: inherit;
    font-size: 12px;
  }
</style>
</head>

  const v = VARIANTS[variantSelect.value];
  const text = compose(v);
  const withTags = text.replace(/(#\w+)/g, '<span class="hashtag">$1</span>');
  captionEl.innerHTML = withTags;
  rawEl.textContent = text;
  const words = text.split(/\s+/).filter(Boolean).length;
  countEl.textContent = `${text.length} chars · ${words} words`;
  countEl.style.color = words > 150 ? '#c33' : '';
}

function setVariant(id) {
  variantSelect.value = id;
  const v = VARIANTS[id];
  hookInput.value = v.hook;
  tagsInput.value = v.tags;
  render();
}

setVariant('v1');

variantSelect.addEventListener('change', () => setVariant(variantSelect.value));
hookInput.addEventListener('input', render);
tagsInput.addEventListener('input', render);

/* Copy */
document.getElementById('copy-btn').addEventListener('click', async (e) => {
  const btn = e.currentTarget;
  try {
    await navigator.clipboard.writeText(rawEl.textContent);
    const orig = btn.textContent;
    btn.textContent = '✓ Copied';
    setTimeout(() => btn.textContent = orig, 1500);
  } catch {
    const range = document.createRange();
    range.selectNode(rawEl);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
  }
});

/* Tweaks */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "variant": "v1"
}/*EDITMODE-END*/;

const tweaksEl = document.getElementById('tweaks');
window.addEventListener('message', (e) => {
  if (e.data?.type === '__activate_edit_mode') tweaksEl.classList.add('on');
  if (e.data?.type === '__deactivate_edit_mode') tweaksEl.classList.remove('on');
});
window.parent.postMessage({type: '__edit_mode_available'}, '*');

variantSelect.addEventListener('change', () => {
  window.parent.postMessage({type: '__edit_mode_set_keys', edits: {variant: variantSelect.value}}, '*');
});

setVariant(TWEAK_DEFAULTS.variant);

window.addEventListener('load', async () => {
  if (document.fonts && document.fonts.ready) await document.fonts.ready;
  setTimeout(() => window.print(), 500);
});
</script>

</body>
</html>
